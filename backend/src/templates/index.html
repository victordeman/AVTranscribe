<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <title>AVTranscribe - Audio/Video Transcription</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-flex;
        }
        .htmx-request.htmx-indicator {
            display: inline-flex;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-indigo-700 mb-2">AVTranscribe</h1>
            <p class="text-gray-600 text-lg">Fast, accurate, and open-source media transcription</p>
            <div id="auth-status" class="mt-4">
                <!-- Auth status will be shown here -->
            </div>
        </header>

        <main class="max-w-xl mx-auto">
            <div id="auth-forms" class="bg-white rounded-xl shadow-lg overflow-hidden p-8 border border-gray-200 mb-8">
                <div class="flex border-b border-gray-100 mb-6">
                    <button id="login-tab" class="py-2 px-4 text-indigo-700 border-b-2 border-indigo-700 font-semibold" onclick="showAuthTab('login')">Login</button>
                    <button id="signup-tab" class="py-2 px-4 text-gray-500 hover:text-indigo-600 font-semibold" onclick="showAuthTab('signup')">Sign Up</button>
                </div>

                <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" name="username" required class="block w-full mt-1 rounded-md border-gray-300 shadow-sm border p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" name="password" required class="block w-full mt-1 rounded-md border-gray-300 shadow-sm border p-2">
                    </div>
                    <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">Login</button>
                </form>

                <form id="signup-form" class="space-y-4 hidden" onsubmit="handleSignup(event)">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" name="username" required class="block w-full mt-1 rounded-md border-gray-300 shadow-sm border p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" name="password" required class="block w-full mt-1 rounded-md border-gray-300 shadow-sm border p-2">
                    </div>
                    <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">Sign Up</button>
                </form>
                <div id="auth-error" class="mt-4 text-red-600 text-sm hidden"></div>
            </div>

            <div id="main-content" class="bg-white rounded-xl shadow-lg overflow-hidden p-8 border border-gray-200 hidden">
                <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-2">
                    <h2 id="upload-title" class="text-2xl font-semibold text-gray-800">Upload Media</h2>
                    <button onclick="logout()" class="text-sm text-gray-500 hover:text-red-600">Logout</button>
                </div>
            
            <form id="upload-form" 
                  hx-post="/transcribe" 
                  hx-target="#status-container" 
                  hx-swap="outerHTML"
                  hx-indicator="#loading"
                  aria-labelledby="upload-title"
                  enctype="multipart/form-data"
                  class="space-y-6"
                  onreset="document.getElementById('status-container').innerHTML = ''">
                
                <div>
                    <label for="file" class="block text-sm font-medium text-gray-700 mb-1">Select File (Audio or Video)</label>
                    <input type="file" name="file" id="file" required 
                           aria-describedby="file-hint"
                           class="block w-full text-sm text-gray-500
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-md file:border-0
                                  file:text-sm file:font-semibold
                                  file:bg-indigo-50 file:text-indigo-700
                                  hover:file:bg-indigo-100 cursor-pointer transition-all">
                    <p id="file-hint" class="mt-1 text-xs text-gray-600">Supported formats: mp3, wav, mp4, mkv, etc. Max 100MB.</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="language" class="block text-sm font-medium text-gray-700 mb-1">Language</label>
                        <select name="language" id="language" 
                                class="block w-full mt-1 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2.5 bg-gray-50">
                            <option value="auto">Auto-detect</option>
                            <option value="en">English</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                            <option value="it">Italian</option>
                            <option value="pt">Portuguese</option>
                            <option value="nl">Dutch</option>
                            <option value="ru">Russian</option>
                            <option value="zh">Chinese</option>
                            <option value="ja">Japanese</option>
                            <option value="ko">Korean</option>
                        </select>
                    </div>

                    <div>
                        <label for="format" class="block text-sm font-medium text-gray-700 mb-1">Media Format</label>
                        <select name="format" id="format" 
                                class="block w-full mt-1 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2.5 bg-gray-50">
                            <option value="auto">Auto</option>
                            <option value="audio">Audio Only</option>
                            <option value="video">Video</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200">
                        Transcribe Now
                    </button>
                </div>
            </form>

            <div id="loading" class="htmx-indicator w-full mt-6" role="status" aria-live="polite">
                <div class="bg-indigo-50 rounded-lg p-4 border border-indigo-100">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex flex-col">
                            <span id="upload-progress-text" class="text-xs font-semibold text-indigo-700 uppercase">Uploading...</span>
                            <span id="upload-eta" class="text-[10px] text-indigo-500 mt-1">Estimating time...</span>
                        </div>
                        <svg class="animate-spin h-4 w-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                    <div class="w-full bg-indigo-200 rounded-full h-1.5">
                        <div id="upload-progress-bar" class="bg-indigo-600 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="status-container">
                <!-- Status snippets will be loaded here via HTMX -->
            </div>
            </div>

            <script>
                // Auth Management
                function showAuthTab(tab) {
                    const loginTab = document.getElementById('login-tab');
                    const signupTab = document.getElementById('signup-tab');
                    const loginForm = document.getElementById('login-form');
                    const signupForm = document.getElementById('signup-form');

                    if (tab === 'login') {
                        loginTab.classList.add('text-indigo-700', 'border-b-2', 'border-indigo-700');
                        loginTab.classList.remove('text-gray-500');
                        signupTab.classList.remove('text-indigo-700', 'border-b-2', 'border-indigo-700');
                        signupTab.classList.add('text-gray-500');
                        loginForm.classList.remove('hidden');
                        signupForm.classList.add('hidden');
                    } else {
                        signupTab.classList.add('text-indigo-700', 'border-b-2', 'border-indigo-700');
                        signupTab.classList.remove('text-gray-500');
                        loginTab.classList.remove('text-indigo-700', 'border-b-2', 'border-indigo-700');
                        loginTab.classList.add('text-gray-500');
                        signupForm.classList.remove('hidden');
                        loginForm.classList.add('hidden');
                    }
                }

                async function handleLogin(e) {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const errorEl = document.getElementById('auth-error');
                    errorEl.classList.add('hidden');

                    try {
                        const response = await fetch('/login', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        if (response.ok) {
                            localStorage.setItem('token', data.access_token);
                            checkAuth();
                        } else {
                            errorEl.innerText = data.detail || 'Login failed';
                            errorEl.classList.remove('hidden');
                        }
                    } catch (err) {
                        errorEl.innerText = 'Connection error';
                        errorEl.classList.remove('hidden');
                    }
                }

                async function handleSignup(e) {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const errorEl = document.getElementById('auth-error');
                    errorEl.classList.add('hidden');

                    try {
                        const response = await fetch('/signup', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        if (response.ok) {
                            showAuthTab('login');
                            errorEl.innerText = 'Account created! Please login.';
                            errorEl.classList.remove('hidden');
                            errorEl.classList.replace('text-red-600', 'text-green-600');
                        } else {
                            errorEl.innerText = data.detail || 'Signup failed';
                            errorEl.classList.remove('hidden');
                        }
                    } catch (err) {
                        errorEl.innerText = 'Connection error';
                        errorEl.classList.remove('hidden');
                    }
                }

                function logout() {
                    localStorage.removeItem('token');
                    checkAuth();
                }

                function checkAuth() {
                    const token = localStorage.getItem('token');
                    const authForms = document.getElementById('auth-forms');
                    const mainContent = document.getElementById('main-content');

                    if (token) {
                        authForms.classList.add('hidden');
                        mainContent.classList.remove('hidden');
                    } else {
                        authForms.classList.remove('hidden');
                        mainContent.classList.add('hidden');
                    }
                }

                document.addEventListener('DOMContentLoaded', checkAuth);

                // HTMX configuration for JWT
                document.body.addEventListener('htmx:configRequest', function(evt) {
                    const token = localStorage.getItem('token');
                    if (token) {
                        evt.detail.headers['Authorization'] = 'Bearer ' + token;
                    }
                });

                document.body.addEventListener('htmx:beforeSend', function(evt) {
                    if (evt.detail.elt.id === 'upload-form') {
                        // Reset status container for new upload
                        const container = document.getElementById('status-container');
                        if (container) {
                            container.innerHTML = '';
                        }
                    }
                });

                document.body.addEventListener('htmx:xhr:progress', function(evt) {
                    if (evt.detail.elt.id === 'upload-form') {
                        const percent = evt.detail.loaded / evt.detail.total * 100;
                        const progressBar = document.getElementById('upload-progress-bar');
                        const progressText = document.getElementById('upload-progress-text');
                        const etaText = document.getElementById('upload-eta');

                        if (progressBar) {
                            progressBar.style.width = percent + '%';
                            if (percent >= 100) {
                                progressText.innerText = 'Finalizing upload...';
                                etaText.innerText = 'Upload complete. Processing will begin shortly.';
                            } else {
                                progressText.innerText = 'Uploading: ' + Math.round(percent) + '%';

                                // Simple ETA calculation for transcription (heuristic)
                                // Based on average audio duration vs file size (~1MB/min for mp3)
                                // and Whisper 'base' model speed (~1:5 real-time)
                                const fileSizeMB = evt.detail.total / (1024 * 1024);
                                const estMediaDurationMin = fileSizeMB; // very rough estimate
                                const estProcessTimeSec = estMediaDurationMin * 60 / 5; // 1:5 speedup

                                if (estProcessTimeSec < 60) {
                                    etaText.innerText = `Est. transcription time: < 1 min`;
                                } else {
                                    etaText.innerText = `Est. transcription time: ~${Math.round(estProcessTimeSec / 60)} min`;
                                }
                            }
                        }
                    }
                });
            </script>
        </main>

        <footer class="mt-16 text-center text-gray-600 text-sm">
            <p>&copy; 2024 AVTranscribe. Powered by FastAPI, Celery, and Whisper.</p>
        </footer>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
